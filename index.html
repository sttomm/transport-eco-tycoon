<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport Eco Tycoon — Renewable Grid Edition</title>
<link rel="stylesheet" href="styles.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <div id="app"></div>

  <div id="topbar">
    <span id="money">€600k</span>
    <span class="sep"></span>
    <span id="clock">Day 1 08:00</span>
    <span id="speeds">
      <button data-s="0">⏸</button><button data-s="1" class="on">▶</button><button data-s="3">▶▶</button><button data-s="10">▶▶▶</button>
    </span>
    <span class="sep"></span>
    <button id="demandbtn" title="Show where passengers wait and where they want to go (V)">👥 Demand</button>
    <span class="sep"></span>
    <span id="gridstat" class="good">⚡ 0 / 0 MW</span>
    <span id="storemini" class="small"></span>
    <span class="sep"></span>
    <span id="solarstat" class="small"></span>
    <span id="windstat" class="small"></span>
    <span id="season" class="small"></span>
    <span class="sep"></span>
    <span id="pop" class="small"></span>
    <span id="co2" class="small good"></span>
  </div>
  <div id="toolhint"></div>

  <div id="tabbtns">
    <button data-tab="dashboard" title="Dashboard">📊</button>
    <button data-tab="research" title="Research">🔬</button>
    <button data-tab="routes" title="Routes & Vehicles">🚌</button>
    <button data-tab="learn" title="Energy Encyclopedia">📚</button>
  </div>

  <div id="sidepanel">
    <div class="tabpage" id="tab-dashboard">
      <h3>📊 Grid Dashboard <span class="dim small">(last 48 h)</span></h3>
      <canvas id="powerchart" class="chart" width="336" height="170"></canvas>
      <div id="chartlegend"></div>
      <canvas id="battbar" class="chart" width="336" height="22"></canvas>
      <canvas id="h2bar" class="chart" width="336" height="22"></canvas>
      <div id="kpis"></div>
      <h3 style="margin-top:8px">💰 Finances</h3>
      <canvas id="moneychart" class="chart" width="336" height="70"></canvas>
      <div id="finrows"></div>
    </div>
    <div class="tabpage" id="tab-research" style="display:none"></div>
    <div class="tabpage" id="tab-routes" style="display:none"></div>
    <div class="tabpage" id="tab-learn" style="display:none"></div>
  </div>

  <div id="leftcol">
    <div id="quests"></div>
    <div id="infobox"></div>
  </div>
  <div id="advisor"></div>
  <div id="toolbar"></div>
  <div id="tooltip"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
